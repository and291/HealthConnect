name: Module Graph

on:
  pull_request:
  push:
    branches: [main]

jobs:
  module-graph:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push auto-commit on main
      pull-requests: write   # post / update PR comment

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Generate module graphs
        run: ./gradlew generateInternalModuleGraph generateExternalModuleGraph

      # ── Pull request: post or update a single bot comment with both diagrams ──
      - name: Post diagrams as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Build comment body from the two generated files
          {
            echo "<!-- module-graph -->"
            echo "## Module graphs"
            echo ""
            cat INTERNAL_MODULE_GRAPH.md
            echo ""
            echo "---"
            echo ""
            cat EXTERNAL_MODULE_GRAPH.md
          } > /tmp/comment.md

          # Find an existing comment left by this workflow (identified by the marker)
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]"
                              and (.body | startswith("<!-- module-graph -->"))) | .id' \
            | head -1)

          if [ -n "$COMMENT_ID" ]; then
            # Update the existing comment so the PR thread stays clean
            jq -n --rawfile body /tmp/comment.md '{"body": $body}' \
              | gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH --input -
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          fi

      # ── Main branch: commit updated .md files as persistent documentation ──
      - name: Commit updated graphs (main)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- INTERNAL_MODULE_GRAPH.md EXTERNAL_MODULE_GRAPH.md; then
            git add INTERNAL_MODULE_GRAPH.md EXTERNAL_MODULE_GRAPH.md
            git commit -m "docs: regenerate module graphs [skip ci]"
            git push
          fi
